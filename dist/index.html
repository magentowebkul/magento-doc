<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Magento Documentation</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff;
      --text: #111;
      --muted: #666;
      --line: #e5e5e5;
      --hover: #f7f7f7;
      --accent: #006aff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(1060px, calc(100% - 40px));
      margin: 0 auto;
      padding: 72px 0;
    }
    .label {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      max-width: 760px;
      margin: 16px 0 14px;
      font-size: clamp(40px, 6vw, 72px);
      line-height: .95;
      letter-spacing: 0;
    }
    p {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      margin-top: 44px;
    }
    .card {
      display: grid;
      gap: 10px;
      min-height: 170px;
      padding: 24px;
      color: inherit;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      transition: background .15s ease, border-color .15s ease;
    }
    .card:hover {
      background: var(--hover);
      border-color: #d4d4d4;
    }
    .card strong {
      font-size: 20px;
      line-height: 1.3;
    }
    .card span:last-child {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <div class="label">Webkul Magento Docs</div>
    <h1>Magento product documentation</h1>
    <p>Select a product guide. Each product lives in its own folder path so more documentation can be added under this same domain.</p>
    <section class="grid" aria-label="Product documentation">
      
      <a class="card" href="/hyva-jewelry-theme/">
        <span class="eyebrow">User Guide</span>
        <strong>Magento 2 Hyvä Jewellery Theme</strong>
        <span>User guide for installing, activating, and managing the Hyvä Jewellery Theme.</span>
      </a>
    </section>
  </main>
</body>
</html>
